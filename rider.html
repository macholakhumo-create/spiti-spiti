<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Spiti-Spiti">
  <title>Spiti-Spiti Rider</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; }
    nav { background: #16161d; border-bottom: 1px solid #2a2a3a; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 1rem; font-weight: 700; letter-spacing: -0.03em; }
    .brand span { color: #6c63ff; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 0.75rem; color: #555; }
    .nav-user strong { color: #e8e8f0; }
    .logout-btn { background: none; border: 1px solid #2a2a3a; color: #555; font-family: 'Inter', sans-serif; font-size: 0.7rem; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: all 0.3s; flex-shrink: 0; }
    .conn-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }
    .greeting { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 3px; }
    .greeting-sub { font-size: 0.8rem; color: #555; margin-bottom: 20px; }

    .card { background: #16161d; border: 1px solid #2a2a3a; border-radius: 16px; padding: 18px; margin-bottom: 14px; }
    .card-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6c63ff; margin-bottom: 12px; }
    .field { margin-bottom: 11px; }
    label { display: block; font-size: 0.7rem; color: #555; margin-bottom: 4px; font-weight: 500; }
    input[type=text], input[type=number] { width: 100%; background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 10px; padding: 11px 13px; color: #e8e8f0; font-family: 'Inter', sans-serif; font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #6c63ff; }
    .fare-hint { font-size: 0.65rem; color: #333; margin-top: 3px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
    .btn:last-child { margin-bottom: 0; }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-ghost { background: #1e1e28; color: #666; border: 1px solid #2a2a3a; }
    .btn:hover { opacity: 0.88; }

    /* PROGRESS */
    .progress-bar { display: flex; align-items: flex-start; margin-bottom: 18px; padding: 0 4px; }
    .prog-step { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .prog-dot { width: 30px; height: 30px; border-radius: 50%; background: #1e1e28; border: 2px solid #2a2a3a; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: #333; transition: all 0.4s; position: relative; z-index: 1; }
    .prog-dot.active { background: #6c63ff22; border-color: #6c63ff; color: #6c63ff; box-shadow: 0 0 12px #6c63ff44; }
    .prog-dot.done { background: #22c55e; border-color: #22c55e; color: #fff; }
    .prog-line { flex: 1; height: 2px; background: #1e1e28; margin-top: 14px; transition: background 0.4s; }
    .prog-line.done { background: #22c55e; }
    .prog-label { font-size: 0.58rem; color: #333; margin-top: 5px; text-align: center; font-weight: 500; transition: color 0.3s; }
    .prog-label.active { color: #6c63ff; }
    .prog-label.done { color: #22c55e; }

    .panel { display: none; }
    .panel.visible { display: block; }

    .route-display { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .route-row { display: flex; align-items: center; gap: 10px; }
    .route-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; flex-shrink: 0; }
    .route-dot.from { background: #1e293b; }
    .route-dot.to { background: #14532d; }
    .route-lbl { font-size: 0.62rem; color: #444; margin-bottom: 1px; }
    .route-val { font-size: 0.83rem; color: #ccc; }

    .fare-display { background: #0f0f13; border-radius: 10px; padding: 12px; text-align: center; margin-bottom: 12px; }
    .fare-num { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.04em; }
    .fare-num.purple { color: #6c63ff; }
    .fare-num.green { color: #22c55e; }
    .fare-lbl { font-size: 0.65rem; color: #444; margin-top: 2px; }

    /* OFFERS */
    .offers-wrap { margin-bottom: 12px; }
    .offers-head { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #a855f7; margin-bottom: 8px; }
    .offer-card { background: #120f1a; border: 1px solid #a855f722; border-radius: 12px; padding: 12px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    .offer-name { font-size: 0.82rem; font-weight: 600; margin-bottom: 2px; }
    .offer-price { font-size: 1.2rem; font-weight: 700; color: #a855f7; }
    .offer-tag { font-size: 0.6rem; color: #555; margin-top: 2px; }
    .offer-actions { display: flex; gap: 6px; }
    .obtn { padding: 7px 12px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.73rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .obtn.acc { background: #22c55e; color: #fff; }
    .obtn.dec { background: #1e1e28; color: #666; border: 1px solid #2a2a3a; }
    .obtn:hover { opacity: 0.85; }

    /* DRIVER CARD */
    .driver-card { background: #0f0f13; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .driver-av { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#6c63ff,#22c55e); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem; color: #fff; flex-shrink: 0; }
    .driver-name { font-size: 0.85rem; font-weight: 600; }
    .driver-sub { font-size: 0.68rem; color: #555; margin-top: 2px; }

    /* MAP */
    #rider-map { width: 100%; height: 200px; border-radius: 12px; margin-bottom: 10px; background: #0f0f13; border: 1px solid #2a2a3a; position: relative; overflow: hidden; }
    .map-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .map-pulse { width: 48px; height: 48px; border-radius: 50%; background: #6c63ff22; border: 2px solid #6c63ff44; display: flex; align-items: center; justify-content: center; animation: mapPulse 2s infinite; }
    @keyframes mapPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.7} }
    .map-status-row { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: #444; margin-bottom: 10px; }
    .map-live-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .map-live-dot.on { background: #22c55e; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .driver-pin { position: absolute; transition: all 0.5s ease; transform: translate(-50%, -50%); }
    .driver-pin-dot { width: 18px; height: 18px; border-radius: 50%; background: #6c63ff; border: 3px solid #fff; box-shadow: 0 0 12px #6c63ff88; }
    .driver-pin-ring { position: absolute; top: -6px; left: -6px; width: 30px; height: 30px; border-radius: 50%; border: 2px solid #6c63ff44; animation: ringPulse 2s infinite; }
    @keyframes ringPulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2);opacity:0} }

    /* CHAT */
    .chat-wrap { background: #0f0f13; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .chat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .chat-title { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #6c63ff; }
