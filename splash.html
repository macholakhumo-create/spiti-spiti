<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Black · Spiti-Spiti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* BRAND MARK — glossy black pill */
    .brand-mark {
      width: 72px; height: 72px;
      background: linear-gradient(160deg, #2A2A2A 0%, #141414 55%, #0A0A0A 100%);
      border-radius: 20px;
      border: 1px solid #3A3A3A;
      border-top-color: #484848;
      box-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 1px 4px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      animation: markIn 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .brand-mark svg { width: 36px; height: 36px; }

    @keyframes markIn {
      from { opacity: 0; transform: scale(0.82) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .brand {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: #F2F2F2;
      animation: fadeUp 0.7s ease 0.35s both;
      display: flex; align-items: center; gap: 3px;
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
      margin-left: 2px;
      margin-bottom: 2px;
    }
    .tagline {
      font-size: 0.75rem;
      color: #4A4A4A;
      margin-top: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      animation: fadeUp 0.7s ease 0.55s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ROAD + CAR STRIP */
    .track-wrap {
      width: 100vw;
      height: 160px;
      position: relative;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .road {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 48px;
      background: #0E0E0E;
      border-top: 1px solid #1A1A1A;
    }
    .dash-track {
      position: absolute;
      bottom: 21px; left: 0;
      width: 200%;
      display: flex;
      gap: 28px;
      animation: dashMove 1.6s linear infinite;
    }
    .dash {
      width: 30px; height: 3px;
      background: #2A2A2A;
      border-radius: 2px;
      flex-shrink: 0;
    }
    @keyframes dashMove {
      from { transform: translateX(0); }
      to   { transform: translateX(-58px); }
    }

    .car-wrap {
      position: absolute;
      bottom: 46px;
      animation: loop 2.6s linear infinite;
    }
    @keyframes loop {
      0%   { left: -110px; }
      100% { left: calc(100vw + 20px); }
    }

    /* exhaust puffs */
    .puff {
      position: absolute;
      border-radius: 50%;
      background: #1E1E1E;
      bottom: 14px;
      animation: puffOut 0.9s ease-out infinite;
    }
    .p1 { width: 9px; height: 9px; left: -13px; animation-delay: 0s; }
    .p2 { width: 7px; height: 7px; left: -24px; animation-delay: 0.2s; }
    .p3 { width: 5px; height: 5px; left: -34px; animation-delay: 0.38s; }
    @keyframes puffOut {
      0%   { opacity: 0.5; transform: scale(0.5) translateX(0) translateY(0); }
      100% { opacity: 0;   transform: scale(2.4) translateX(-8px) translateY(-8px); }
    }

    /* LOADING BAR — glossy chrome */
    .load-bar-wrap {
      width: 160px; height: 3px;
      background: #1A1A1A;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 28px;
      animation: fadeUp 0.5s ease 0.7s both;
    }
    .load-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #484848, #C8C8C8, #FFFFFF, #C8C8C8);
      background-size: 200% 100%;
      border-radius: 3px;
      animation: shimmer 1.4s ease-in-out infinite, growBar 3.2s ease forwards;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes growBar {
      0%   { width: 0%; }
      80%  { width: 90%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="track-wrap">
    <div class="road">
      <div class="dash-track">
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div>
      </div>
    </div>

    <div class="car-wrap">
      <div class="puff p1"></div>
      <div class="puff p2"></div>
      <div class="puff p3"></div>
      <!-- Matte black car body, white/chrome trim -->
      <svg width="92" height="48" viewBox="0 0 92 48" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <rect x="6" y="20" width="80" height="20" rx="5" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
        <!-- Roof -->
        <path d="M24 20 Q30 6 46 5 Q64 5 64 20Z" fill="#0E0E0E" stroke="#2A2A2A" stroke-width="1"/>
        <!-- Windshields — chrome tint -->
        <path d="M30 19 Q34 9 46 8 Q58 8 58 19Z" fill="#1E1E1E" stroke="#3A3A3A" stroke-width="0.5" opacity="0.9"/>
        <!-- Headlight — white glow -->
        <rect x="79" y="23" width="6" height="5" rx="2" fill="#FFFFFF" opacity="0.9"/>
        <rect x="79" y="23" width="6" height="5" rx="2" fill="#FFFFFF" filter="url(#glow)"/>
        <!-- Tail light — dim red -->
        <rect x="7" y="24" width="5" height="5" rx="2" fill="#CC2222" opacity="0.7"/>
        <!-- Door line — glossy highlight -->
        <line x1="46" y1="21" x2="46" y2="38" stroke="#2A2A2A" stroke-width="0.8"/>
        <!-- Chrome roof rail -->
        <line x1="24" y1="20" x2="64" y2="20" stroke="#3A3A3A" stroke-width="1"/>
        <!-- Wheels -->
        <circle cx="22" cy="40" r="8" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="2"/>
        <circle cx="22" cy="40" r="3" fill="#1A1A1A" stroke="#4A4A4A" stroke-width="1.5"/>
        <circle cx="68" cy="40" r="8" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="2"/>
        <circle cx="68" cy="40" r="3" fill="#1A1A1A" stroke="#4A4A4A" stroke-width="1.5"/>
        <!-- Chrome bumper line -->
        <line x1="7" y1="34" x2="84" y2="34" stroke="#2A2A2A" stroke-width="0.8"/>
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
      </svg>
    </div>
  </div>

  <div class="brand-mark">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Car icon white on glossy black -->
      <rect x="4" y="14" width="28" height="14" rx="3" fill="white" opacity="0.95"/>
      <path d="M8 14 Q11 6 18 6 Q26 6 26 14Z" fill="white" opacity="0.7"/>
      <circle cx="10" cy="28" r="3.5" fill="#080808" stroke="white" stroke-width="1.5"/>
      <circle cx="26" cy="28" r="3.5" fill="#080808" stroke="white" stroke-width="1.5"/>
      <rect x="26" y="17" width="4" height="4" rx="1" fill="#080808"/>
    </svg>
  </div>

  <div class="brand">Black<div class="brand-dot"></div></div>
  <div class="tagline">Your ride, your way</div>

  <div class="load-bar-wrap">
    <div class="load-bar-fill"></div>
  </div>

  <script>
    if (sessionStorage.getItem('splashed')) {
      const driver = localStorage.getItem('spiti_driver');
      const rider  = localStorage.getItem('spiti_rider');
      if (driver) window.location.href = 'driver.html';
      else if (rider) window.location.href = 'rider.html';
      else window.location.href = 'login.html';
    }
    sessionStorage.setItem('splashed', '1');
    setTimeout(() => {
      const driver = localStorage.getItem('spiti_driver');
      const rider  = localStorage.getItem('spiti_rider');
      if (driver) window.location.href = 'driver.html';
      else if (rider) window.location.href = 'rider.html';
      else window.location.href = 'login.html';
    }, 3500);
  </script>
</body>
</html>
