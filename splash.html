<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Black · Spiti-Spiti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* BRAND MARK — glossy black pill */
    .brand-mark {
      width: 72px; height: 72px;
      background: linear-gradient(160deg, #2A2A2A 0%, #141414 55%, #0A0A0A 100%);
      border-radius: 20px;
      border: 1px solid #3A3A3A;
      border-top-color: #484848;
      box-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 1px 4px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      animation: markIn 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .brand-mark svg { width: 36px; height: 36px; }

    @keyframes markIn {
      from { opacity: 0; transform: scale(0.82) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .brand {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: #F2F2F2;
      animation: fadeUp 0.7s ease 0.35s both;
      display: flex; align-items: center; gap: 3px;
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
      margin-left: 2px;
      margin-bottom: 2px;
    }
    .tagline {
      font-size: 0.75rem;
      color: #4A4A4A;
      margin-top: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      animation: fadeUp 0.7s ease 0.55s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ROAD + CAR STRIP */
    .track-wrap {
      width: 100vw;
      height: 160px;
      position: relative;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .road {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 48px;
      background: #0E0E0E;
      border-top: 1px solid #1A1A1A;
    }
    .dash-track {
      position: absolute;
      bottom: 21px; left: 0;
      width: 200%;
      display: flex;
      gap: 28px;
      animation: dashMove 1.6s linear infinite;
    }
    .dash {
      width: 30px; height: 3px;
      background: #2A2A2A;
      border-radius: 2px;
      flex-shrink: 0;
    }
    @keyframes dashMove {
      from { transform: translateX(0); }
      to   { transform: translateX(-58px); }
    }

    .car-wrap {
      position: absolute;
      bottom: 46px;
      animation: loop 2.6s linear infinite;
    }
    @keyframes loop {
      0%   { left: -110px; }
      100% { left: calc(100vw + 20px); }
    }

    /* exhaust puffs */
    .puff {
      position: absolute;
      border-radius: 50%;
      background: #1E1E1E;
      bottom: 14px;
      animation: puffOut 0.9s ease-out infinite;
    }
    .p1 { width: 9px; height: 9px; left: -13px; animation-delay: 0s; }
    .p2 { width: 7px; height: 7px; left: -24px; animation-delay: 0.2s; }
    .p3 { width: 5px; height: 5px; left: -34px; animation-delay: 0.38s; }
    @keyframes puffOut {
      0%   { opacity: 0.5; transform: scale(0.5) translateX(0) translateY(0); }
      100% { opacity: 0;   transform: scale(2.4) translateX(-8px) translateY(-8px); }
    }

    /* LOADING BAR — glossy chrome */
    .load-bar-wrap {
      width: 160px; height: 3px;
      background: #1A1A1A;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 28px;
      animation: fadeUp 0.5s ease 0.7s both;
    }
    .load-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #484848, #C8C8C8, #FFFFFF, #C8C8C8);
      background-size: 200% 100%;
      border-radius: 3px;
      animation: shimmer 1.4s ease-in-out infinite, growBar 3.2s ease forwards;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes growBar {
      0%   { width: 0%; }
      80%  { width: 90%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="track-wrap">
    <div class="road">
      <div class="dash-track">
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div>
      </div>
    </div>

    <div class="car-wrap">
      <div class="puff p1"></div>
      <div class="puff p2"></div>
      <div class="puff p3"></div>
      <!-- Matte black car body, white/chrome trim -->
      <svg width="96" height="48" viewBox="0 0 96 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail light (left) -->
  <rect x="5" y="27" width="4" height="5" rx="2" fill="#CC2222" opacity="0.7"/>
  <!-- Body — long low sedan -->
  <path d="M6 33 C6 28 9 26 14 25 L29 24 C35 17 45 14 55 14 L67 14 C75 15 81 19 86 25 L92 27 C95 28 95 30 95 33 L95 35 C95 37 94 38 91 38 L10 38 C7 38 6 37 6 34 Z" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Greenhouse glass -->
  <path d="M31 24 C36 18 44 16 53 15 L65 15 C72 16 78 19 83 24 Z" fill="#1E1E1E" stroke="#3A3A3A" stroke-width="0.5" opacity="0.9"/>
  <!-- B-pillar -->
  <line x1="57" y1="15" x2="57" y2="24" stroke="#0E0E0E" stroke-width="1"/>
  <!-- Chrome window surround -->
  <path d="M31 24 C36 18 44 16 53 15 L65 15 C72 16 78 19 83 24" fill="none" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Chrome belt line -->
  <line x1="14" y1="28" x2="88" y2="28" stroke="#3A3A3A" stroke-width="0.8"/>
  <!-- Headlight (right) — white glow -->
  <rect x="88" y="28" width="7" height="4" rx="2" fill="#FFFFFF" opacity="0.95"/>
  <rect x="88" y="28" width="7" height="4" rx="2" fill="#FFFFFF" filter="url(#glow)"/>
  <!-- Wheels -->
  <circle cx="27" cy="40" r="8" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="2"/>
  <circle cx="27" cy="40" r="3" fill="#1A1A1A" stroke="#4A4A4A" stroke-width="1.5"/>
  <circle cx="73" cy="40" r="8" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="2"/>
  <circle cx="73" cy="40" r="3" fill="#1A1A1A" stroke="#4A4A4A" stroke-width="1.5"/>
  <!-- Chrome lower trim -->
  <line x1="9" y1="35" x2="92" y2="35" stroke="#2A2A2A" stroke-width="0.8"/>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
    </div>
  </div>

  <div class="brand-mark">
   <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M3 22 C3 19 5 18 8 17 L13 16 C16 12 21 11 25 11 L28 11 C31 12 33 14 34 17 L34 20 C34 22 33 23 31 23 L5 23 C4 23 3 22 3 21 Z" fill="white" opacity="0.95"/>
  <path d="M14 16 C17 13 21 12 25 12 C28 13 30 14 31 16 Z" fill="white" opacity="0.55"/>
  <circle cx="11" cy="23" r="3.5" fill="#080808" stroke="white" stroke-width="1.5"/>
  <circle cx="27" cy="23" r="3.5" fill="#080808" stroke="white" stroke-width="1.5"/>
</svg>
  </div>

  <div class="brand">Black<div class="brand-dot"></div></div>
  <div class="tagline">Your ride, your way</div>

  <div class="load-bar-wrap">
    <div class="load-bar-fill"></div>
  </div>

  <script>
    if (sessionStorage.getItem('splashed')) {
      const driver = localStorage.getItem('spiti_driver');
      const rider  = localStorage.getItem('spiti_rider');
      if (driver) window.location.href = 'driver.html';
      else if (rider) window.location.href = 'rider.html';
      else window.location.href = 'login.html';
    }
    sessionStorage.setItem('splashed', '1');
    setTimeout(() => {
      const driver = localStorage.getItem('spiti_driver');
      const rider  = localStorage.getItem('spiti_rider');
      if (driver) window.location.href = 'driver.html';
      else if (rider) window.location.href = 'rider.html';
      else window.location.href = 'login.html';
    }, 3500);
  </script>
</body>
</html>
