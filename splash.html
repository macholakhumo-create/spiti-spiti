<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .brand {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e8e8f0;
      margin-top: 24px;
      letter-spacing: -0.03em;
      animation: fadeIn 1s ease 0.3s both;
    }
    .brand span { color: #22c55e; }
    .tagline {
      font-size: 0.78rem;
      color: #444;
      margin-top: 6px;
      animation: fadeIn 1s ease 0.6s both;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .track-wrap {
      width: 100vw;
      height: 180px;
      position: relative;
      overflow: hidden;
    }
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 52px;
      background: #16161d;
      border-top: 3px solid #1e1e28;
    }
    .dash-track {
      position: absolute;
      bottom: 22px;
      left: 0;
      width: 200%;
      display: flex;
      gap: 24px;
      animation: dashMove 1.8s linear infinite;
    }
    .dash {
      width: 32px;
      height: 4px;
      background: #22c55e;
      opacity: 0.35;
      border-radius: 2px;
      flex-shrink: 0;
    }
    @keyframes dashMove {
      from { transform: translateX(0); }
      to   { transform: translateX(-56px); }
    }

    .car-wrap {
      position: absolute;
      bottom: 52px;
      animation: loop 2.8s linear infinite;
    }
    @keyframes loop {
      0%   { left: -100px; }
      100% { left: calc(100vw + 10px); }
    }

    .puff {
      position: absolute;
      border-radius: 50%;
      background: #aaa;
      bottom: 18px;
      animation: puffOut 0.8s ease-out infinite;
    }
    .p1 { width: 10px; height: 10px; left: -14px; animation-delay: 0s; }
    .p2 { width: 8px;  height: 8px;  left: -26px; animation-delay: 0.18s; }
    .p3 { width: 6px;  height: 6px;  left: -38px; animation-delay: 0.34s; }
    @keyframes puffOut {
      0%   { opacity: 0.65; transform: scale(0.5) translateX(0) translateY(0); }
      100% { opacity: 0;    transform: scale(2.2) translateX(-10px) translateY(-10px); }
    }
  </style>
</head>
<body>

  <div class="track-wrap">
    <div class="road">
      <div class="dash-track">
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div><div class="dash"></div>
        <div class="dash"></div><div class="dash"></div>
      </div>
    </div>

    <div class="car-wrap">
      <div class="puff p1"></div>
      <div class="puff p2"></div>
      <div class="puff p3"></div>

      <svg width="90" height="48" viewBox="0 0 90 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="18" width="78" height="22" rx="5" fill="#22c55e"/>
        <path d="M22 18 Q28 4 45 3 Q64 3 62 18Z" fill="#1a8f3c"/>
        <path d="M28 17 Q32 7 45 6 Q58 6 56 17Z" fill="#0f2a1a" opacity="0.75"/>
        <rect x="78" y="22" width="7" height="5" rx="2" fill="#f59e0b" opacity="0.9"/>
        <rect x="5" y="22" width="5" height="5" rx="2" fill="#ef4444" opacity="0.85"/>
        <g><circle cx="22" cy="40" r="8" fill="#0f0f13" stroke="#22c55e" stroke-width="2.5"/><circle cx="22" cy="40" r="3.5" fill="#0f0f13" stroke="#22c55e" stroke-width="1.5"/></g>
        <g><circle cx="64" cy="40" r="8" fill="#0f0f13" stroke="#22c55e" stroke-width="2.5"/><circle cx="64" cy="40" r="3.5" fill="#0f0f13" stroke="#22c55e" stroke-width="1.5"/></g>
      </svg>
    </div>
  </div>

  <div class="brand">Spiti-Spiti<span>.</span></div>
  <div class="tagline">Your ride, your way</div>

  <script>
    setTimeout(() => {
      const driver = localStorage.getItem('spiti_driver');
      const rider  = localStorage.getItem('spiti_rider');
      if (driver) window.location.href = 'driver.html';
      else if (rider) window.location.href = 'rider.html';
      else window.location.href = 'login.html';
    }, 3500);
  </script>
</body>
</html>
