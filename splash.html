<!-- splash.html -->
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .logo { width: 160px; height: 160px; }
    .brand {
      font-family: 'Inter', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #e8e8f0;
      margin-top: 18px;
      letter-spacing: -0.03em;
    }
    .brand span { color: #22c55e; }
    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: #444;
      margin-top: 6px;
    }
    .fade { 
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.8s ease forwards; 
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    .puff1 { animation: puff1 1.6s ease-out forwards; transform-origin: 200px 395px; }
    .puff2 { animation: puff2 1.6s ease-out 0.15s forwards; transform-origin: 180px 395px; }
    .puff3 { animation: puff3 1.6s ease-out 0.3s forwards; transform-origin: 163px 395px; }
    @keyframes puff1 {
      0%   { opacity: 0; transform: scale(0.3) translateX(30px); }
      20%  { opacity: 0.7; }
      60%  { opacity: 0.5; transform: scale(1.6) translateX(-10px) translateY(-6px); }
      100% { opacity: 0; transform: scale(2.4) translateX(-22px) translateY(-14px); }
    }
    @keyframes puff2 {
      0%   { opacity: 0; transform: scale(0.3) translateX(24px); }
      20%  { opacity: 0.45; }
      60%  { opacity: 0.3; transform: scale(1.4) translateX(-8px) translateY(-5px); }
      100% { opacity: 0; transform: scale(2.1) translateX(-18px) translateY(-12px); }
    }
    @keyframes puff3 {
      0%   { opacity: 0; transform: scale(0.3) translateX(18px); }
      20%  { opacity: 0.25; }
      60%  { opacity: 0.15; transform: scale(1.2) translateX(-6px) translateY(-4px); }
      100% { opacity: 0; transform: scale(1.8) translateX(-14px) translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="fade">
    <svg class="logo" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="roundclip">
          <rect x="140" y="140" width="400" height="400" rx="88"/>
        </clipPath>
      </defs>
      <!-- Background -->
      <rect x="140" y="140" width="400" height="400" rx="88" fill="#0f0f13"/>
      <rect x="140" y="140" width="400" height="400" rx="88" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.3"/>
      <!-- Road -->
      <rect x="140" y="420" width="400" height="120" fill="#16161d" clip-path="url(#roundclip)"/>
      <rect x="140" y="418" width="400" height="4" fill="#1e1e28" clip-path="url(#roundclip)"/>
      <!-- Dashed centre line -->
      <line x1="170" y1="460" x2="220" y2="460" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="240" y1="460" x2="290" y2="460" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="310" y1="460" x2="360" y2="460" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="380" y1="460" x2="430" y2="460" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="450" y1="460" x2="500" y2="460" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <!-- Car body -->
      <rect x="230" y="365" width="220" height="72" rx="12" fill="#22c55e"/>
      <!-- Cabin -->
      <path d="M278 365 Q290 320 350 318 Q415 318 400 365Z" fill="#1a8f3c"/>
      <!-- Windshield -->
      <path d="M292 363 Q300 334 350 332 Q398 332 386 363Z" fill="#0f2a1a" opacity="0.7"/>
      <!-- Wheels -->
      <circle cx="278" cy="438" r="22" fill="#16161d" stroke="#22c55e" stroke-width="4"/>
      <circle cx="278" cy="438" r="10" fill="#0f0f13" stroke="#22c55e" stroke-width="2.5"/>
      <circle cx="402" cy="438" r="22" fill="#16161d" stroke="#22c55e" stroke-width="4"/>
      <circle cx="402" cy="438" r="10" fill="#0f0f13" stroke="#22c55e" stroke-width="2.5"/>
      <!-- Headlight -->
      <rect x="442" y="385" width="14" height="8" rx="3" fill="#f59e0b" opacity="0.9"/>
      <!-- Tail light -->
      <rect x="224" y="385" width="10" height="8" rx="3" fill="#ef4444" opacity="0.8"/>
      <!-- Animated smoke puffs -->
      <circle class="puff1" cx="200" cy="395" r="7" fill="#aaaaaa"/>
      <circle class="puff2" cx="178" cy="393" r="6" fill="#999999"/>
      <circle class="puff3" cx="160" cy="391" r="5" fill="#888888"/>
      <!-- Brand text inside icon -->
      <text x="340" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#e8e8f0" letter-spacing="-1.5">Spiti<tspan fill="#22c55e">·</tspan>Spiti</text>
    </svg>
    <div class="brand">Spiti-Spiti<span>.</span></div>
    <div class="tagline">Your ride, your way</div>
  </div>

  <script>
    setTimeout(() => {
      const driver = localStorage.getItem('spiti_driver');
      const rider  = localStorage.getItem('spiti_rider');
      if (driver) window.location.href = 'driver.html';
      else if (rider) window.location.href = 'rider.html';
      else window.location.href = 'login.html';
    }, 2200);
  </script>
</body>
</html>
