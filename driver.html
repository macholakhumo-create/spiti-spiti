<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiti-Spiti Driver</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; }
    nav { background: #16161d; border-bottom: 1px solid #2a2a3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em; }
    .brand span { color: #22c55e; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .conn-badge { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: #666; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: all 0.3s; }
    .dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .emergency-btn { display: flex; align-items: center; gap: 6px; background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; animation: emergencyPulse 2s infinite; text-decoration: none; }
    @keyframes emergencyPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
    .container { max-width: 520px; margin: 0 auto; padding: 32px 20px; }
    .page-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 6px; }
    .page-sub { font-size: 0.85rem; color: #555; margin-bottom: 32px; }
    .card { background: #16161d; border: 1px solid #2a2a3a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .card-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #22c55e; margin-bottom: 16px; }
    .availability-toggle { background: #16161d; border: 1px solid #2a2a3a; border-radius: 16px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .toggle-label { font-size: 0.88rem; font-weight: 500; }
    .toggle-sub { font-size: 0.72rem; color: #555; margin-top: 3px; }
    .switch { position: relative; width: 52px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #2a2a3a; border-radius: 28px; cursor: pointer; transition: 0.3s; }
    .slider:before { content: ""; position: absolute; width: 20px; height: 20px; left: 4px; bottom: 4px; background: #fff; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider:before { transform: translateX(24px); }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #16161d; border: 1px solid #2a2a3a; border-radius: 12px; padding: 18px; }
    .stat-num { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.04em; color: #22c55e; }
    .stat-label { font-size: 0.72rem; color: #555; margin-top: 4px; }

    /* INCOMING */
    .incoming { background: linear-gradient(135deg, #14532d, #166534); border: 1px solid #22c55e44; border-radius: 16px; padding: 24px; margin-bottom: 20px; display: none; animation: pulse 2s infinite; }
    .incoming.visible { display: block; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.2)} 50%{box-shadow:0 0 0 12px rgba(34,197,94,0)} }
    .incoming-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .incoming-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(34,197,94,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .incoming-title { font-size: 0.95rem; font-weight: 600; }
    .incoming-sub { font-size: 0.72rem; color: #86efac; margin-top: 2px; }
    .route { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .route-point { display: flex; align-items: center; gap: 10px; }
    .route-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
    .route-icon.pickup { background: rgba(255,255,255,0.1); }
    .route-icon.dropoff { background: rgba(34,197,94,0.2); }
    .route-label { font-size: 0.68rem; color: #86efac; margin-bottom: 2px; }
    .route-text { font-size: 0.85rem; }

    /* FARE INPUT */
    .fare-input-section { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
    .fare-input-label { font-size: 0.72rem; color: #86efac; margin-bottom: 8px; }
    .fare-input-row { display: flex; gap: 8px; align-items: center; }
    .fare-prefix { font-size: 1.1rem; font-weight: 700; color: #22c55e; }
    .fare-input { flex: 1; background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px 12px; color: #e8e8f0; font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600; outline: none; }
    .fare-input:focus { border-color: #22c55e; }

    .btn-row { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.83rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-accept  { background: #22c55e; color: #fff; }
    .btn-decline { background: #1e1e28; color: #888; border: 1px solid #2a2a3a; }
    .btn-full { width: 100%; padding: 12px; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.83rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-bottom: 8px; }
    .btn-full:hover { opacity: 0.88; }
    .btn-start    { background: #f59e0b; color: #000; }
    .btn-complete { background: #22c55e; color: #fff; }

    /* ACTIVE RIDE */
    .active-ride { background: #16161d; border: 1px solid #2a2a3a; border-radius: 16px; padding: 24px; margin-bottom: 20px; display: none; }
    .active-ride.visible { display: block; }
    .fare-display { background: #0f0f13; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .fare-display-label { font-size: 0.72rem; color: #555; }
    .fare-display-amount { font-size: 1.2rem; font-weight: 700; color: #22c55e; }
    .status-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .status-btn { padding: 8px 14px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid #2a2a3a; background: #0f0f13; color: #666; transition: all 0.2s; }
    .status-btn:hover { border-color: #22c55e; color: #22c55e; }

    /* MAP */
    #driver-map { height: 200px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2a2a3a; }
    .location-status { font-size: 0.75rem; color: #555; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .location-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .location-dot.tracking { background: #22c55e; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* CHAT */
    .chat-section { margin-top: 16px; }
    .chat-box { background: #0f0f13; border-radius: 12px; padding: 14px; height: 200px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 0.82rem; line-height: 1.4; }
    .chat-msg.driver { background: #22c55e; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-msg.rider  { background: #1e1e2e; color: #ccc; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-msg-time { font-size: 0.6rem; opacity: 0.6; margin-top: 3px; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input { flex: 1; background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 10px; padding: 10px 14px; color: #e8e8f0; font-family: 'Inter', sans-serif; font-size: 0.83rem; outline: none; }
    .chat-input:focus { border-color: #22c55e; }
    .chat-send { background: #22c55e; border: none; border-radius: 10px; padding: 10px 16px; color: #fff; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; }
    .chat-send:hover { opacity: 0.85; }
    .chat-empty { text-align: center; color: #333; font-size: 0.78rem; padding: 20px; }

    .ride-item { background: #0f0f13; border-radius: 10px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .ride-route { font-size: 0.83rem; }
    .ride-id { font-size: 0.7rem; color: #444; margin-top: 3px; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-requested  { background: #1e293b; color: #94a3b8; }
    .badge-offered    { background: #1e1b4b; color: #818cf8; }
    .badge-accepted   { background: #14532d; color: #22c55e; }
    .badge-in_progress{ background: #451a03; color: #f59e0b; }
    .badge-completed  { background: #1e1b4b; color: #818cf8; }
    .empty { text-align: center; color: #444; font-size: 0.83rem; padding: 20px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 0.83rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>
<nav>
  <div class="brand">Spiti-Spiti<span>.</span> Driver</div>
  <div class="nav-right">
    <a href="tel:999" class="emergency-btn">🚨 999</a>
    <div class="conn-badge">
      <div class="dot" id="dot"></div>
      <span id="conn-label">Connecting...</span>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-title">Driver Dashboard 🚗</div>
  <div class="page-sub">Manage your rides in real time</div>

  <!-- Availability -->
  <div class="availability-toggle">
    <div>
      <div class="toggle-label">Available for Rides</div>
      <div class="toggle-sub" id="avail-sub">You are offline</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="avail-toggle" onchange="toggleAvailability()">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="total-rides">0</div>
      <div class
